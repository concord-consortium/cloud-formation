# adapted from https://github.com/nathanpeck/aws-cloudformation-fargate/

AWSTemplateFormatVersion: '2010-09-09'
Description: Deploy DAVAI OpenAI proxy on AWS Fargate, hosted in a public subnet, and accessible via a public load balancer.
Parameters:
  StackName:
    Type: String
    Default: fargate-public-network
    Description: The name of the parent Fargate networking stack that you created. Necessary
                 to locate and reference resources created by that stack.
  ServiceName:
    Type: String
    Default: davai-openai-proxy
    Description: A name for the service
  ImageUrl:
    Type: String
    Default: concordconsortium/davai-openai-proxy
    Description: The url of a docker image that contains the application process that
                 will handle the traffic for this service
  ContainerCpu:
    Type: Number
    Default: 512
    Description: How much CPU to give the container. 1024 is 1 CPU
  ContainerMemory:
    Type: Number
    Default: 1024
    Description: How much memory in megabytes to give the container
  Path:
    Type: String
    Default: "/davai-openai-proxy*"
    Description: A path on the public load balancer that this service
                 should be connected to. This should NOT be *.
  PriorityForPath:
    Type: Number
    Default: 81
    Description: The priority for the path routing rule added to the load balancer.
                 This only applies if your have multiple services which have been
                 assigned to different paths on the load balancer.
  PriorityForHostname:
    Type: Number
    Default: 82
    Description: The priority for the hostname routing rule added to the load balancer.
                 This only applies if your have multiple services which have been
                 assigned to different paths on the load balancer.
  DesiredCount:
    Type: Number
    Default: 1
    Description: How many copies of the service task to run
  Subdomain:
    Type: String
    Default: davai-openai-proxy
    Description: The sub-domain to add to route (not apps) Route53 DNS record
  OpenAIApiUrl:
    Type: String
    Default: https://api.openai.com/
    Description: OpenAI API Base Url (do not incude the /v1 suffix)
  OpenAIApiKey:
    Type: String
    Description: OpenAI API Key
  LogRequests:
    Type: String
    AllowedValues: ["false", "true"]
    Default: "false"
    Description: Set to false to disable logging requests

Resources:

  # The task definition. This is a simple metadata description of what
  # container to run, and what resource requirements it has.
  TaskDefinition:
    Type: AWS::ECS::TaskDefinition
    DependsOn:
      - LogGroup
    Properties:
      Family: !Ref 'ServiceName'
      Cpu: !Ref 'ContainerCpu'
      Memory: !Ref 'ContainerMemory'
      NetworkMode: awsvpc
      RequiresCompatibilities:
        - FARGATE
      ExecutionRoleArn:
        Fn::ImportValue:
          !Join [':', [!Ref 'StackName', 'ECSTaskExecutionRole']]
      ContainerDefinitions:
        - Name: !Ref 'ServiceName'
          Cpu: !Ref 'ContainerCpu'
          Memory: !Ref 'ContainerMemory'
          Image: !Ref 'ImageUrl'
          PortMappings:
            - ContainerPort: 3000
          LogConfiguration:
            LogDriver: awslogs
            Options:
              awslogs-region: !Ref AWS::Region
              awslogs-group: !Ref LogGroup
              awslogs-stream-prefix: ecs
          Environment:
            - Name: OPENAI_API_URL
              Value: !Ref OpenAIApiUrl
            - Name: OPENAI_API_KEY
              Value: !Ref OpenAIApiKey
            - Name: LOG_REQUESTS
              Value: !Ref LogRequests

  LogGroup:
    Type: AWS::Logs::LogGroup
    Properties:
      LogGroupName: !Join ['', [/ecs/, !Ref 'ServiceName']]

  # The service. The service is a resource which allows you to run multiple
  # copies of a type of task, and gather up their logs and metrics, as well
  # as monitor the number of running tasks and replace any that have crashed
  Service:
    Type: AWS::ECS::Service
    DependsOn:
      - LoadBalancerRule80Path
      - LoadBalancerRule443Path
      - LoadBalancerRule80Host
      - LoadBalancerRule443Host
    Properties:
      ServiceName: !Ref 'ServiceName'
      Cluster:
        Fn::ImportValue:
          !Join [':', [!Ref 'StackName', 'ClusterName']]
      LaunchType: FARGATE
      DeploymentConfiguration:
        MaximumPercent: 200
        MinimumHealthyPercent: 75
      DesiredCount: !Ref 'DesiredCount'
      NetworkConfiguration:
        AwsvpcConfiguration:
          AssignPublicIp: ENABLED
          SecurityGroups:
            - Fn::ImportValue:
                !Join [':', [!Ref 'StackName', 'FargateContainerSecurityGroup']]
            - !Ref ServiceSecurityGroup
          Subnets:
            - Fn::ImportValue:
                !Join [':', [!Ref 'StackName', 'PublicSubnetOne']]
            - Fn::ImportValue:
                !Join [':', [!Ref 'StackName', 'PublicSubnetTwo']]
      TaskDefinition: !Ref 'TaskDefinition'
      LoadBalancers:
        - ContainerName: !Ref 'ServiceName'
          ContainerPort: 3000
          TargetGroupArn: !Ref 'TargetGroup'

  ServiceSecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupDescription: DAVAI OpenAI Proxy ECS service security group
      VpcId:
        Fn::ImportValue:
          !Join [':', [!Ref 'StackName', 'VPCId']]

  # A target group. This is used for keeping track of all the tasks, and
  # what IP addresses / port numbers they have. You can query it yourself,
  # to use the addresses yourself, but most often this target group is just
  # connected to an application load balancer, or network load balancer, so
  # it can automatically distribute traffic across all the targets.
  TargetGroup:
    Type: AWS::ElasticLoadBalancingV2::TargetGroup
    Properties:
      HealthCheckIntervalSeconds: 6
      HealthCheckPath: /
      HealthCheckProtocol: HTTP
      HealthCheckTimeoutSeconds: 5
      HealthyThresholdCount: 2
      TargetType: ip
      Name: !Ref 'ServiceName'
      Port: 3000
      Protocol: HTTP
      UnhealthyThresholdCount: 2
      VpcId:
        Fn::ImportValue:
          !Join [':', [!Ref 'StackName', 'VPCId']]

  LoadBalancerRule80Path:
    Type: AWS::ElasticLoadBalancingV2::ListenerRule
    Properties:
      Actions:
        - TargetGroupArn: !Ref 'TargetGroup'
          Type: 'forward'
      Conditions:
        - Field: path-pattern
          Values: [!Ref 'Path']
      ListenerArn:
        Fn::ImportValue:
          !Join [':', [!Ref 'StackName', 'PublicListener80']]
      Priority: !Ref 'PriorityForPath'
  LoadBalancerRule443Path:
    Type: AWS::ElasticLoadBalancingV2::ListenerRule
    Properties:
      Actions:
        - TargetGroupArn: !Ref 'TargetGroup'
          Type: 'forward'
      Conditions:
        - Field: path-pattern
          Values: [!Ref 'Path']
      ListenerArn:
        Fn::ImportValue:
          !Join [':', [!Ref 'StackName', 'PublicListener443']]
      Priority: !Ref 'PriorityForPath'

  LoadBalancerRule80Host:
    Type: AWS::ElasticLoadBalancingV2::ListenerRule
    Properties:
      Actions:
        - TargetGroupArn: !Ref 'TargetGroup'
          Type: 'forward'
      Conditions:
        - Field: host-header
          Values:
            - Fn::Join:
                - ''
                - - !Ref Subdomain
                  - '.'
                  - Fn::ImportValue: !Join [':', [!Ref 'StackName', 'HostedZoneName']]
      ListenerArn:
        Fn::ImportValue:
          !Join [':', [!Ref 'StackName', 'PublicListener80']]
      Priority: !Ref 'PriorityForHostname'
  LoadBalancerRule443Host:
    Type: AWS::ElasticLoadBalancingV2::ListenerRule
    Properties:
      Actions:
        - TargetGroupArn: !Ref 'TargetGroup'
          Type: 'forward'
      Conditions:
        - Field: host-header
          Values:
            - Fn::Join:
                - ''
                - - !Ref Subdomain
                  - '.'
                  - Fn::ImportValue: !Join [':', [!Ref 'StackName', 'HostedZoneName']]
      ListenerArn:
        Fn::ImportValue:
          !Join [':', [!Ref 'StackName', 'PublicListener443']]
      Priority: !Ref 'PriorityForHostname'

  DNSRecord:
    Type: AWS::Route53::RecordSet
    Properties:
      HostedZoneName:
        Fn::Join:
          - ''
          - - Fn::ImportValue: !Join [':', [!Ref 'StackName', 'HostedZoneName']]
            - '.'
      Name:
        Fn::Join:
          - ''
          - - !Ref Subdomain
            - '.'
            - Fn::ImportValue: !Join [':', [!Ref 'StackName', 'HostedZoneName']]
      Type: A
      Weight: 100
      SetIdentifier: !Ref AWS::StackName
      AliasTarget:
        DNSName:
          Fn::ImportValue: !Join [':', [!Ref 'StackName', 'LoadBalancerDNSName']]
        HostedZoneId:
          Fn::ImportValue: !Join [':', [!Ref 'StackName', 'LoadBalancerCanonicalHostedZoneID']]


